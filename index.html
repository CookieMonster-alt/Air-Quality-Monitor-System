<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Web Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;

            --epa-good: #4caf50;
            --epa-moderate: #ffeb3b;
            --epa-sensitive: #ff9800;
            --epa-unhealthy: #f44336;
            --epa-very-unhealthy: #9c27b0;
            --epa-hazardous: #b71c1c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            min-width: 250px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.1rem;
            color: #aaa;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card .category {
            font-size: 1rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            color: #121212;
        }

        table {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: var(--surface-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #2c2c2c;
            font-weight: 500;
            color: #aaa;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        .epa-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #121212;
        }

        .loading {
            text-align: center;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Global AQI Dashboard</h1>

    <div class="cards-container">
        <div class="card" id="avg-card">
            <h2>Average System AQI</h2>
            <div class="value" id="avg-value">--</div>
            <div class="category" id="avg-cat">Loading...</div>
        </div>

        <div class="card" id="highest-card">
            <h2>Highest Pollution</h2>
            <div class="value" id="high-value">--</div>
            <div class="category" id="high-cat" style="margin-top: 5px;">Loading...</div>
            <div style="font-size: 0.9rem; color: #888; margin-top: 5px;" id="high-city">--</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>City</th>
                <th>AQI Value</th>
                <th>Health Category</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td colspan="4" class="loading">Fetching data...</td>
            </tr>
        </tbody>
    </table>

    <script>
        function getEpaColor(category) {
            const catLower = category.toLowerCase();
            if (catLower.includes('good')) return 'var(--epa-good)';
            if (catLower.includes('moderate')) return 'var(--epa-moderate)';
            if (catLower.includes('sensitive')) return 'var(--epa-sensitive)';
            if (catLower === 'unhealthy') return 'var(--epa-unhealthy)';
            if (catLower.includes('very')) return 'var(--epa-very-unhealthy)';
            if (catLower.includes('hazardous')) return 'var(--epa-hazardous)';
            return '#999';
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                // Average
                document.getElementById('avg-value').innerText = data.average_aqi.toFixed(1);
                const avgCatElem = document.getElementById('avg-cat');
                avgCatElem.innerText = data.average_epa;
                avgCatElem.style.backgroundColor = getEpaColor(data.average_epa);

                // Highest
                if (data.highest_city) {
                    document.getElementById('high-value').innerText = data.highest_aqi;
                    document.getElementById('high-city').innerText = data.highest_city;
                    const highCatElem = document.getElementById('high-cat');
                    highCatElem.innerText = data.highest_epa;
                    highCatElem.style.backgroundColor = getEpaColor(data.highest_epa);
                } else {
                    document.getElementById('high-value').innerText = "N/A";
                    document.getElementById('high-cat').innerText = "No Records";
                }
            } catch (err) {
                console.error("Failed to fetch stats:", err);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = ""; // clear loading

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="loading">No records found.</td></tr>`;
                    return;
                }

                // Sort by AQI descending
                data.sort((a, b) => b.aqi_value - a.aqi_value);

                data.forEach(record => {
                    const tr = document.createElement('tr');

                    const color = getEpaColor(record.epa_category);

                    tr.innerHTML = `
                        <td>${record.city_name}</td>
                        <td style="font-weight: bold;">${record.aqi_value}</td>
                        <td><span class="epa-badge" style="background-color: ${color}">${record.epa_category}</span></td>
                        <td style="color: #aaa; font-size: 0.9rem;">${record.timestamp}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to fetch data:", err);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="4" style="color: red; text-align: center;">Error loading data.</td></tr>`;
            }
        }

        // Initialize
        fetchStats();
        fetchData();

        // Refresh every 30 seconds
        setInterval(() => {
            fetchStats();
            fetchData();
        }, 30000);
    </script>
</body>
</html>
